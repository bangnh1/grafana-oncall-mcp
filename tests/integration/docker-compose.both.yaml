services:
  grafana:
    image: grafana/grafana-oss:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Both plugin IDs allowed; the operator preference (or the
      # default legacy-first rule) decides which one the MCP
      # server talks to.
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "grafana-oncall-app,grafana-irm-app"
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  oncall-seed:
    image: curlimages/curl:latest
    depends_on:
      grafana:
        condition: service_healthy
    volumes:
      - ./seed.sh:/seed.sh:ro
    entrypoint: ["/seed.sh"]

  oncall-mcp:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_SERVICE_ACCOUNT_TOKEN: glsa_test_token
      # Both fixtures are installed; the unset default prefers the
      # legacy plugin and emits a WARN line. Set to "irm" here so
      # the both-installed matrix exercises the IRM path of the
      # precedence table; the unset-default behaviour is covered
      # by the unit tests in internal/oncall/plugin_test.go.
      GRAFANA_ONCALL_PLUGIN_PREFERENCE: "irm"
    depends_on:
      oncall-seed:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
